services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: monocore-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_INACTIVITY_DAYS: ${SESSION_INACTIVITY_DAYS:-30}
      SESSION_ABSOLUTE_DAYS: ${SESSION_ABSOLUTE_DAYS:-90}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-none}
      CSRF_COOKIE_SAMESITE: ${CSRF_COOKIE_SAMESITE:-none}
      API_TRUST_PROXY: ${API_TRUST_PROXY:-true}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_WEB_PUBLIC_API_URL: ${NEXT_PUBLIC_WEB_PUBLIC_API_URL}
    image: monocore-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_WEB_PUBLIC_API_URL: ${NEXT_PUBLIC_WEB_PUBLIC_API_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
